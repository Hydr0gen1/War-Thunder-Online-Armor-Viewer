services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATA_DIR=/app/data
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on: [backend]
